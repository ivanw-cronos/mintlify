paths:
  https://explorer-api.cronos.org/testnet/api/v2?module=account&action=balance:
    get:
      tags:
        - Accounts
      summary: Get CRO Balance for a Single Address
      description: Returns the balance of a single address
      x-codeSamples:
        - lang: cURL
          label: 'CLI'
          source: |
            curl --request GET 'https://explorer-api.cronos.org/testnet/api/v2?module=account&action=balance&address={address}&tag={tag}&apikey={apikey}'
      parameters:
        - name: module
          in: query
          description: Module name
          required: true
          schema:
            type: string
            enum: [account]
        - name: action
          in: query
          description: Action name
          required: true
          schema:
            type: string
            enum: [balance]
        - name: address
          in: query
          description: Account address
          required: true
          schema:
            type: string
        - name: tag
          in: query
          description: Block number or 'latest'
          required: true
          schema:
            type: string
        - name: apikey
          in: query
          description: API Key
          required: true
          schema:
            type: string
      responses:
        '200':
          description: successful operation
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: '1'
                  message:
                    type: string
                    example: 'OK'
                  result:
                    type: string
                    example: '1000000000000000000'
        '401':
          description: unauthorized
          content:
            text/html:
              schema:
                $ref: '#/components/schemas/ErrorUnauthenticated'
        '400':
          description: bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorBadRequest'

