  https://explorer-api.cronos.org/testnet/api/v2?module=account&action=tokennfttx:
    get:
      tags:
        - Accounts
      summary: Get CRC-721 Token Transfer Events by Address
      description: | 
        Returns the list of CRC-721 ( NFT ) tokens transferred by an address, with optional filtering by token contract.
                
        **Important Limitations:**
        - Maximum 10,000 total records can be returned per request per block range
        - Maximum offset is 1000 records per page
        
        **Pagination Strategy:**
        If you need to retrieve more than 10,000 transfer events, use a narrower block range and implement pagination by:
        1. Using smaller block ranges (e.g., 1000-5000 blocks at a time)
        2. Incrementing the startblock and endblock parameters to loop through all blocks
        3. Keeping offset ≤ 1000 and using page parameter for pagination within each block range
        
        Example pagination workflow:
        - First request: startblock=1000000, endblock=1005000, page=1, offset=100
        - If 10k records returned, make next request: startblock=1000000, endblock=1004000, page=1, offset=100
        - Continue until fewer than 10k records are returned
      x-codeSamples:
        - lang: cURL
          label: 'CLI'
          source: |
            curl --request GET 'https://explorer-api.cronos.org/testnet/api/v2?module=account&action=tokennfttx&address={address}&startblock={startblock}&endblock={endblock}&page={page}&offset={offset}&apikey={apikey}'
      parameters:
        - name: module
          in: query
          description: Module name
          required: true
          schema:
            type: string
            enum: [account]
        - name: action
          in: query
          description: Action name
          required: true
          schema:
            type: string
            enum: [tokennfttx]
        - name: contractaddress
          in: query
          description: Token contract address
          required: false
          schema:
            type: string
        - name: address
          in: query
          description: Account address
          required: true
          schema:
            type: string
        - name: startblock
          in: query
          description: Starting block number
          required: true
          schema:
            type: integer
        - name: endblock
          in: query
          description: Ending block number. Use smaller ranges if you need to retrieve more than 10k total transactions.
          required: true
          schema:
            type: integer
        - name: page
          in: query
          description: Page number
          required: true
          schema:
            type: integer
        - name: offset
          in: query
          description: Number of records per page (maximum 1000)
          required: true
          schema:
            type: integer
            maximum: 1000
        - name: apikey
          in: query
          description: API Key
          required: true
          schema:
            type: string
      responses:
        '200':
          description: successful operation
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: '1'
                  message:
                    type: string
                    example: 'OK'
