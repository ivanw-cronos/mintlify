  https://explorer-api.cronos.org/testnet/api/v2?module=account&action=txlist:
    get:
      tags:
        - Accounts
      summary: Get Normal Transactions by Address
      description: |
        Returns a list of normal transactions by address.
        
        **Important Limitations:**
        - Maximum 10,000 total records can be returned per request per block range
        - Maximum offset is 1000 records per page
        
        **Pagination Strategy:**
        If you need to retrieve more than 10,000 transactions, use a narrower block range and implement pagination by:
        1. Using smaller block ranges (e.g., 1000-5000 blocks at a time)
        2. Incrementing the startblock and endblock parameters to loop through all blocks
        3. Keeping offset ≤ 1000 and using page parameter for pagination within each block range
        
        Example pagination workflow:
        - First request: startblock=1000000, endblock=1005000, page=1, offset=100
        - If 10k records returned, make next request: startblock=1000000, endblock=1004000, page=1, offset=100
        - Continue until fewer than 10k records are returned
      x-codeSamples:
        - lang: cURL
          label: 'CLI'
          source: |
            curl --request GET 'https://explorer-api.cronos.org/testnet/api/v2?module=account&action=txlist&address={address}&startblock={startblock}&endblock={endblock}&page={page}&offset={offset}&apikey={apikey}'
      parameters:
        - name: module
          in: query
          description: Module name
          required: true
          schema:
            type: string
            enum: [account]
        - name: action
          in: query
          description: Action name
          required: true
          schema:
            type: string
            enum: [txlist]
        - name: address
          in: query
          description: Account address
          required: true
          schema:
            type: string
        - name: startblock
          in: query
          description: Starting block number
          required: true
          schema:
            type: integer
        - name: endblock
          in: query
          description: Ending block number. Use smaller ranges if you need to retrieve more than 10k total transactions.
          required: true
          schema:
            type: integer
        - name: page
          in: query
          description: Page number
          required: true
          schema:
            type: integer
        - name: offset
          in: query
          description: Number of records per page (maximum 1000)
          required: true
          schema:
            type: integer
            maximum: 1000
        - name: apikey
          in: query
          description: API Key
          required: true
          schema:
            type: string
      responses:
        '200':
          description: successful operation
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: '1'
                  message:
                    type: string
                    example: 'OK'
                  result:
                    type: array
                    items:
                      type: object
                      properties:
                        blockNumber:
                          type: string
                          example: '21929'
                        timeStamp:
                          type: string
                          example: '1636454661'
                        hash:
                          type: string
                          example: '0x2c30c044e9084c3ef49308bb89379a2570ea3ec2e7396794aacd9185bee2547a'
                        nonce:
                          type: string
                          example: '23'
                        blockHash:
                          type: string
                          example: '0x21972f1cfc00f77c6bba87512ae179252a39465931633f5c4b0b35c4ffa34aa3'
                        transactionIndex:
                          type: string
                          example: '14'
                        from:
                          type: string
                          example: '0x718d61377524348eb05293c78fbd8a62b14924b0'
                        to:
                          type: string
                          example: '0xbf62c67ea509e86f07c8c69d0286c0636c50270b'
                        value:
                          type: string
                          example: '0'
                        gas:
                          type: string
                          example: '44354'
                        gasPrice:
                          type: string
                          example: '5000000000000'
                        isError:
                          type: string
                          example: '0'
                        txreceipt_status:
                          type: string
                          example: '1'
                        input:
                          type: string
                          example: '0x095ea7b3000000000000000000000000dccd6455ae04b03d785f12196b492b18129564bcffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffff'
                        contractAddress:
                          type: string
                          example: ''
                        cumulativeGasUsed:
                          type: string
                          example: '1988603'
                        gasUsed:
                          type: string
                          example: '44354'
                        confirmations:
                          type: string
                          example: '19700840'
                        methodId:
                          type: string
                          example: '0x095ea7b3'
                        functionName:
                          type: string
                          example: 'approve(address spender, uint256 amount)'
        '401':
          description: unauthorized
          content:
            text/html:
              schema:
                $ref: '#/components/schemas/ErrorUnauthenticated'
        '400':
          description: bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorBadRequest'

