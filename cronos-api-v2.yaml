openapi: 3.1.0
info:
  title: Cronos API - Testnet
  description: |
    Welcome to the Cronos API documentation.
    
    As a means to provide equitable access to blockchain data, we've developed the Cronos Developer APIs to empower developers with direct access to Cronos's blockchain data and services via GET/POST requests.
    # Creating Account and Getting API Key
    ## 1. Register an Account
    Head over to the <a href="https://explorer.cronos.org/testnet/register"><strong>Account Registration</strong></a> page and provide email and password for your account.
    
    <img src="https://explorer-api.cronos.org/asset/cronos-api-registration.png" style="
        display: block;
        margin-left: auto;
        margin-right: auto;
        width: 80%;"/>
    
    ## 2. Verify Your Email
    A verification code will be sent to your email address to verify your sign up request. Fill in on the verification page for completing your registration
    
    <img src="https://explorer-api.cronos.org/asset/cronos-api-verification.png" style="
        display: block;
        margin-left: auto;
        margin-right: auto;
        width: 50%;"/>
    
    ## 3. Exploring Your Account
    Upon signing in, you will have access to your account dashboard where you can make full use of Cronos explorer's features such as viewing API keys and viewing submitted contract verification status.

    <img src="https://explorer-api.cronos.org/asset/cronos-api-member-dashboard.png" style="
        display: block;
        margin-left: auto;
        margin-right: auto;
        width: 50%;"/>
    
    ## 4. Getting an Default API Key
    From your Account Dashboard, click on label <strong>My API Keys</strong>.
    From there, you may view your API Keys. By Default, each Cronos Explorer account will assign a default API Key on registration completed.

    <img src="https://explorer-api.cronos.org/asset/cronos-api-key-list.png" style="
        display: block;
        margin-left: auto;
        margin-right: auto;
        width: 50%;"/>
    
    ## 5. Using APIs
    Once got your API Key, you could fetch data from provided endpoints.
    
    Example:
    ```
      curl --request GET 'https://explorer-api.cronos.org/testnet/api/v1/{module}/{action}?apikey={your_apikey}
    ```
  version: 2.0.1

