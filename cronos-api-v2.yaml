                      browserURL: "https://explorer.cronos.org/testnet" // <-- replace the Cronos explorer url
                    }
                  }
                ]
              }
          }
          ```
          ## 2. Contract deployment script
          ```
          npx hardhat run scripts/deploy.js --network cronosTestnet
          ```

          ## 3. Contract verification script
          ```
          npx hardhat verify --network cronosTestnet <contract_address>
          ```      

