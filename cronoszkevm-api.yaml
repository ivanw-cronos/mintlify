paths:
  # Accounts path
  https://explorer-api.zkevm.cronos.org/api/v1/account/getBalance:
    get:
      tags:
        - Accounts
      summary: Get Native Token Balance by Address
      description: Returns the native token balance of a given address
      x-codeSamples:
        - lang: cURL
          label: 'CLI'
          source: |
            curl --request GET 'https://explorer-api.zkevm.cronos.org/api/v1/account/getBalance?address={address}&apikey={apikey}
      parameters:
        - name: address
          in: query
          description: Cronos zkEVM address
          required: true
          schema:
            type: string
        - name: blockHeight
          in: query
          description: The block height in number or the string latest, earliest (block 0), pending.
          required: false
          schema:
            type: string
        - name: apikey
          in: query
          description: API Key
          required: true
          schema:
            type: string
      responses:
        '200':
          description: successful operation
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: '1'
                  message:
                    type: string
                    example: 'OK'
                  result:
                    type: object
                    properties:
                      balance:
                        type: string
                        example: 10
        '401':
          description: unauthorized
          content:
            text/html:
              schema:
                $ref: '#/components/schemas/ErrorUnauthenticated'
        '400':
          description: bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorBadRequest'

  https://explorer-api.zkevm.cronos.org/api/v1/account/getTxsByAddress:
    get:
      tags:
        - Accounts
      summary: Get Transactions by Address
      description: Returns the list of transactions performed by an address and block range, with optional pagination.
      x-codeSamples:
        - lang: cURL
          label: 'CLI'
          source: |
            curl --request GET 'https://explorer-api.zkevm.cronos.org/api/v1/account/getTxsByAddress?address={address}&startBlock={startBlock}&endBlock={endBlock}&session={session}&apikey={apikey}'
      parameters:
        - name: address
          in: query
          description: Cronos zkEVM address
          required: true
          schema:
            type: string
        - name: startBlock
          in: query
          description: Start block range, the difference with endBlock is limited to 10000
          required: true
          schema:
            type: string
        - name: endBlock
          in: query
          description: End block range, the difference with startBlock is limited to 10000
          required: true
          schema:
            type: string
        - name: session
          in: query
          description: Previous page session. Leave it empty for first page
          required: false
          schema:
            type: string
        - name: limit
          in: query
          description: Page size
          required: false
          schema:
            type: integer
            default: 20
            maximum: 100
        - name: apikey
          in: query
          description: API Key
          required: true
          schema:
            type: string
      responses:
        '200':
          description: successful operation
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: '1'
                  message:
                    type: string
                    example: 'OK'
                  metadata:
                    $ref: "#/components/schemas/ResponseMetadata"
                  pagination:
                    $ref: "#/components/schemas/ResponsePagination"
                  result:
                    type: array
                    items:
                      type: object
                      properties:
                        blockNumber:
                          type: integer
                          example: 16094014
                        transactionHash:
                          type: string
                          example: '0x98efa9be6d9485c0dd9c24eb17b92935d61f2925511231637fd71b69dbebd38d'
                        status:
                          type: integer
                          example: 1
                        error:
                          type: string
                          example: ''
                        from:
                          type: object
                          properties:
                            address:
                              type: string
                              example: '0x5e1be25d4a2de0083012f1b5a8030a7023ffa5bc'
                            isContract:
                              type: boolean
                        to:
                          type: object
                          properties:
                            address:
                              type: string
                              example: '0x114dd7a351d44d792ff422e5ebed8515698b0810'
                            isContract:
                              type: boolean
                        gas:
                          type: string
                          example: '526118'
                        gasPrice:
                          type: string
                          example: '1758379992904'
                        gasLimit:
                          type: string
                          example: '533265'
                        timestamp:
                          type: integer
                          example: 1702126099
                        methodId:
                          type: string
                          example: '0x4b1bcc4e'
                        methodName:
                          type: string
                          example: ''
                        index:
                          type: integer
                          example: 0
                        value:
                          type: string
                          example: '0'
                        type:
                          type: string
                          example: '2'
                        nonce:
                          type: integer
                          example: 305642
                        input:
                          type: string
                          example: ''
                        contractAddress:
                          type: string
                          example: ''
                        confirmations:
                          type: integer
                          example: 22
        '401':
          description: unauthorized
          content:
            text/html:
              schema:
                $ref: '#/components/schemas/ErrorUnauthenticated'
        '400':
          description: bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorBadRequest'

