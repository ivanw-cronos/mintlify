                        type: string
                        example: A
                      contractCreationTx:
                        type: string
                        example: ''
                      optimizerEnabled:
                        type: boolean
                      createdAt:
                        type: string
                        example: '2023-12-07T06:53:39.250955Z'
                      contractAddress:
                        type: string
                        example: '0xA044CbE1B1fBd9a4771dBc87DA8cBc7Dc8eE3587'
                      license:
                        type: string
                        example: 'MIT'
                      bytecode:
                        type: string
                        example: ''
                      implementation:
                        type: string
                        example: ''
                      swarmSource:
                        type: string
                        example: ''
                      zkSolcVersion:
                        type: string
                        example: 'v1.3.19'
                      zksyncContractVerificationId:
                        type: string
                        example: '123'
                      proxy:
                        type: boolean
                      updatedAt:
                        type: string
                        example: '2023-12-07T06:53:39.250955Z'
