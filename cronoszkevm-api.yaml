  https://explorer-api.zkevm.cronos.org/api/v1/contract/verify/hardhat?module=contract&action=verifySourceCode:
     post:
       tags:
         - Contracts
       summary: "[Etherscan Hardhat] Submit EVM Contract verification"
       status: 200
       description: |
         Submits a contract source code for verification using Hardhat.
  
         ## 1. Config the `hardhat.config.js` file
         For this API version, user needs to add the custom chains Cronos Zkevm inside the Etherscan config. And comment out the zksolc config.
  
         hardhat.config.js
         ```
          const config: HardhatUserConfig = {
              networks: {
                  cronosZkEvmMainnet: {
                      url: "https://mainnet.zkevm.cronos.org",
                      ethNetwork: "mainnet",
                      zksync: false,
                  },
              },
               etherscan: {
                  apiKey: {
                      cronosZkEvmMainnet: "{apikey}",
                  },
                  customChains: [
                      {
                          network: "cronosZkEvmMainnet",
                          chainId: 388,
                          urls: {
                              apiURL: "https://explorer-api.zkevm.cronos.org/api/v1/contract/verify/hardhat",
                              browserURL: "https://explorer.zkevm.cronos.org",
                          },
                      },
                  ],
              },
              # zksolc: {
              #    ...
              # },
              solidity: {
                 ...
              },
          };
         ```
         ## 2a. Contract deployment and verification script
         ```
         npx hardhat deploy-zksync --script MyERC20Token.ts --network cronosZkEvmMainnet
         ```
         Sample smart contract Github project: https://github.com/kentimsit/cronos-zkevm-hardhat-boilerplate

         ## 2b. Contract verification script
         ```
         npx hardhat verify --network cronosZkEvmMainnet <contract_address>
         ```
  
         For more detail about Zksync Hardhat, please visit https://code.zksync.io/tutorials/how-to-verify-contracts
       requestBody:
         content:
           application/x-www-form-urlencoded:
             schema:
               type: object
               properties:
                 codeFormat:
                   type: string
                   description: "solidity-standard-json-input | solidity-single-file"
                   example: "solidity-standard-json-input"
                   required: true
                 sourceCode:
                   type: object
                   properties:
                    language:
                      type: string
                      description: Source Code Language
                      example: Solidity
                      required: true
                    sources:
                      type: object
                      properties:
                          contracts/test.sol:
                            type: object
                            properties:
                              content:
                                type: string
                                description: Source Code
                                example: |
                                  // SPDX-License-Identifier: MIT
                                  pragma solidity ^0.8.0;
                                  contract Test {
                                      function test() public {
                                          // test function
                                      }
                                  }
                    settings:
                      type: object
                      description: Compiler Settings
                      properties:
                        evmVersion:
                          type: string
                          example: "paris"
                        optimizer:
                          type: object
                          properties:
                            enabled:
                              type: boolean
                              example: true
                            mode:
                              type: string
                              example: "3"
                        outputSelection:
                          type: object
                          properties:
                            "*":
                              type: object
                              properties:
                                "*":
                                  type: array
                                  items:
                                    type: string
                                  example: ["*"]
                 constructorArguements:
                  type: string
                  description: Constructor arguments of contract
                  example: ""
                  required: true
                 contractaddress:
                   type: string
                   description: Address of Contract
                   example: "0x5950C403095EDE4Bc82d6c22Bc4342f6619C87A0"
                   required: true
                 contractname:
                   type: string
                   description: Name of Contract
                   example: "contracts/bridge/L2StandardERC20.sol:L2StandardERC20"
                   required: true
                 compilerversion:
                   type: string
                   description: "Solc compiler version"
                   example: "v0.8.24+commit.e11b9ed9"
                   required: true
                 zksolcVersion:
                   type: string
                   description: "Zksolc compiler version"
                   example: "v1.3.18"
                   required: false
       responses:
         '200':
           description: successful operation
           content:
             application/json:
               schema:
                 type: object
                 properties:
                    status:
                      type: string
                      example: '1'
                    message:
                      type: string
                      example: 'OK'
                    result:
                      type: integer
                      example: 1
         '401':
           description: unauthorized
           content:
             text/html:
               schema:
                 $ref: '#/components/schemas/ErrorUnauthenticated'
         '400':
           description: bad request
           content:
             application/json:
               schema:
                  type: object
                  properties:
                    status:
                      type: string
                      example: '0'
                    message:
                      type: string
                      example: 'Error message'
                    result:
                      type: string
                      example: 'Error details'

