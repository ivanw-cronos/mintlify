  # Blocks path
  https://explorer-api.zkevm.cronos.org/api/v1/block/getBlock:
    get:
      tags:
        - Blocks
      summary: Get Block Detail by Height
      description: Returns the block detail for a certain block height.
      x-codeSamples:
        - lang: cURL
          label: 'CLI'
          source: |
            curl --request GET 'https://explorer-api.zkevm.cronos.org/api/v1/block/getBlock?blockHeight={blockHeight}&apikey={apikey}'
      parameters:
        - name: blockHeight
          in: query
          description: Block height
          required: true
          schema:
            type: string
        - name: apikey
          in: query
          description: API Key
          required: true
          schema:
            type: string
      responses:
        '200':
          description: successful operation
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: '1'
                  message:
                    type: string
                    example: 'OK'
                  result:
                    type: object
                    properties:
                      blockNumber:
                        type: integer
                        example: 16110976
                      timestamp:
                        type: integer
                        example: 1702167579
                      blockHash:
