                          example: 16120450
                        transactionHash:
                          type: string
                          example: '0x68d9423a7d9f4c122f267331a4b4336c2d25edeb0dfd82709d363b672aefa137'
                        timestamp:
                          type: integer
                          example: 1702190747
                        from:
                          type: object
                          properties:
                            address:
                              type: string
                              example: '0xcd5cb3a4aed7ae16719f9a78f7a5f88803ee4c89'
                            isContract:
                              type: boolean
                        to:
                          type: object
                          properties:
                            address:
                              type: string
                              example: '0xce528fada8befcacc848ae9d0fd06770b11f43db'
                            isContract:
                              type: boolean
                        value:
                          type: string
                          example: '0'
                        type:
                          type: string
                          example: 'STATICCALL'
                        gasLimit:
                          type: integer
                          example: 124102
                        traceId:
                          type: string
                          example: '0'
                        isError:
                          type: string
                          example: '0'
                        callError:
                          type: string
                          example: ''
                        input:
                          type: string
                          example: '0x0bdeecbd'
                        contractAddress:
                          type: string
                          example: '0xd355d3fd626d9c5d1e1fc8677939387d5392a56a'
        '401':
          description: unauthorized
          content:
            text/html:
              schema:
