  https://explorer-api.zkevm.cronos.org/api/v1/contract/verifySourceCode:
    post:
      tags:
        - Contracts
      summary: Submit Contract Verification
      description: Submits a contract source code for verification.
      x-codeSamples:
        - lang: cURL
          label: 'CLI'
          source: |
            curl --location --request POST 'https://explorer-api.zkevm.cronos.org/api/v1/contract/verifySourceCode?apikey={apikey}' \
            --form 'contractAddress="{contractAddress}"' \
            --form 'name="{name}"' \
            --form 'compilerVersion="{compilerVersion}"' \
            --form 'constructorArguments="{constructorArguments}"' \
            --form 'contract[]=@"{file_path}"' \
            --form 'compilerType="solidity-standard-json-input"' \
            --form 'zkCompilerVersion="{zkCompilerVersion}"'
      parameters:
        - name: apikey
          in: query
          description: API Key
          required: true
          schema:
            type: string
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                contractAddress:
                  type: string
                  description: Contract address
                  required: true
                name:
                  type: string
                  description: Name of Contract
                  required: true
                compilerVersion:
                  type: string
                  description: Compiler version for contract e.g. 0.8.23
                  required: true
                constructorArguments:
                  type: string
                  description: Constructor arguments of contract
                  required: false
                compilerType:
                  type: string
                  description: Compiler type of contract
                  required: true
                  enum:
                    - solidity-standard-json-input
                contract[]:
                  type: file
                  description: >-
                    Json file is located in `/artifacts/build-info/xxxxxxx.json` following the format:
                    https://docs.soliditylang.org/en/latest/using-the-compiler.html#input-description
                  required: true
                  enum:
                    - .json
                zkCompilerVersion:
                  type: string
                  description: Zksync compiler version for contract
                  required: true

      responses:
        '200':
          description: successful operation
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: '1'
                  message:
                    type: string
                    example: 'OK'
                  result:
                    type: object
                    properties:
                      compilerVersion:
                        type: string
                        example: '0.8.19'
                      optimizerRuns:
