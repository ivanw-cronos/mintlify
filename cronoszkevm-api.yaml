  #Contracts Path
  https://explorer-api.zkevm.cronos.org/api/v1/contract/getAbi:
    get:
      tags:
        - Contracts
      summary: Get Contract ABI
      description: Returns the contract Application Binary Interface ( ABI ) of a verified smart contract.
      x-codeSamples:
        - lang: cURL
          label: 'CLI'
          source: |
            curl --request GET 'https://explorer-api.zkevm.cronos.org/api/v1/contract/getAbi?address={address}&apikey={apikey}'
      parameters:
        - name: address
          in: query
          description: Contract address
          required: true
          schema:
            type: string
        - name: apikey
          in: query
          description: API Key
          required: true
          schema:
            type: string
      responses:
        '200':
          description: successful operation
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: '1'
                  message:
                    type: string
                    example: 'OK'
                  result:
                    type: object
                    properties:
                      abi:
                        type: string
