            curl --request GET 'https://explorer-api.zkevm.cronos.org/api/v1/account/getInternalTxsByBlockRange?startBlock={startBlock}&endBlock={endBlock}&session={session}&apikey={apikey}'
      parameters:
        - name: startBlock
          in: query
          description: Start block range, the difference with endBlock is limited to 10000
          required: true
          schema:
            type: string
        - name: endBlock
          in: query
          description: End block range, the difference with startBlock is limited to 10000
          required: true
          schema:
            type: string
        - name: session
          in: query
          description: Previous page session. Leave it empty for first page
          required: false
          schema:
            type: string
        - name: limit
          in: query
          description: Page size
          required: false
          schema:
            type: integer
            default: 20
            maximum: 100
        - name: apikey
          in: query
          description: API Key
          required: true
          schema:
            type: string
      responses:
        '200':
          description: successful operation
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
