  https://explorer-api.zkevm.cronos.org/api/v1/contract/verify/hardhat:
     post:
       tags:
         - Contracts
       summary: "[Hardhat] Submit Contract verification"
       status: 200
       description: |
         Submits a contract source code for verification using Zksync Hardhat.

         **Note: Please install and use @matterlabs/hardhat-zksync-verify version v1.7.1 or later instead of using hardhat-etherscan**

         ## 1. Config the `hardhat.config.js` file
         For this API version, user needs to specify the API key in `verifyURL`.
  
         hardhat.config.js
         ```
          const config: HardhatUserConfig = {
              networks: {
                  cronosZkEvmMainnet: {
                      url: "https://mainnet.zkevm.cronos.org",
                      ethNetwork: "mainnet",
                      zksync: true,
                      verifyURL: "https://explorer-api.zkevm.cronos.org/api/v1/contract/verify/hardhat?apikey={apikey}",
                  },
              },
              zksolc: {
                 ...
              },
              solidity: {
                 ...
              },
          };
         ```
         ## 2a. Contract deployment and verification script
         ```
         npx hardhat deploy-zksync --script MyERC20Token.ts --network cronosZkEvmMainnet
         ```
         Sample smart contract Github project: https://github.com/kentimsit/cronos-zkevm-hardhat-boilerplate

         ## 2b. Contract verification script
         ```
         npx hardhat verify --network cronosZkEvmMainnet <contract_address>
         ```
  
         For more detail about Zksync Hardhat, please visit https://code.zksync.io/tutorials/how-to-verify-contracts
       requestBody:
         content:
           application/json:
             schema:
               type: object
               properties:
                 codeFormat:
