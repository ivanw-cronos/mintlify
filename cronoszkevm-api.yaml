openapi: 3.1.0
info:
  title: Cronos zkEVM API
  description: |
    Welcome to the Cronos zkEVM API documentation.
    
    As a means to provide equitable access to blockchain data, we've developed the Cronos zkEVM Developer APIs to empower developers with direct access to Cronos's ZK EVM blockchain data and services via GET/POST requests.
    # Creating Account and Getting API Key
    ## 1. Register an Account
    Head over to the <a href="https://developers.zkevm.cronos.org/register"><strong>Account Registration</strong></a> page and provide email and password for your account.
    
    <img src="https://explorer-api-doc.zkevm.cronos.org/asset/zkevm-api-registration.png" style="
        display: block;
        margin-left: auto;
        margin-right: auto;
        width: 50%;"/>
    
    ## 2. Verify Your Email
    A verification code will be sent to your email address to verify your sign up request. Fill in on the verification page for completing your registration
    
    <img src="https://explorer-api-doc.zkevm.cronos.org/asset/zkevm-api-verification.png" style="
        display: block;
        margin-left: auto;
        margin-right: auto;
        width: 50%;"/>
    
    ## 3. Exploring Your Account
    Upon signing in, you will have access to your account dashboard where you can make full use of Cronos zkEVM Developer Portal's features such as getting your API keys and viewing submitted contract verification status.

    <img src="https://explorer-api-doc.zkevm.cronos.org/asset/zkevm-api-member-dashboard.png" style="
        display: block;
        margin-left: auto;
        margin-right: auto;
        width: 50%;"/>
    
    ## 4. Getting an Default API Key
    From your Account Dashboard, click on label <strong>API Keys</strong>.
    From there, you may view your API Keys. By Default, each Cronos zkEVM Developer Portal account will assign a default API Key on registration completed.

    <img src="https://explorer-api-doc.zkevm.cronos.org/asset/zkevm-mainnet-api-key-list.png" style="
        display: block;
        margin-left: auto;
        margin-right: auto;
        width: 50%;"/>
    
    ## 5. Using APIs
    Once got your API Key, you could fetch data from provided endpoints.
    
    Example:
    ```
      curl --request GET 'https://explorer-api.zkevm.cronos.org/api/v1/{module}/{action}?apikey={your_apikey}
    ```
  version: 1.0.0

tags:
  - name: Accounts
    description: Account module
  - name: Blocks
    description: Block module
  - name: Contracts
